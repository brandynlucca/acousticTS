# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      
name: Build status

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,    r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: ${{ matrix.config.r != 'devel' }}
          error-on: '"error"'

      - name: Install Linux Fortran toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Install macOS GNU toolchain
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gcc

      - name: Configure macOS GNU toolchain
        if: runner.os == 'macOS'
        run: |
          GXX=$(ls /opt/homebrew/bin/g++-* 2>/dev/null | sort -V | tail -1)
          GFORTRAN=$(ls /opt/homebrew/bin/gfortran-* 2>/dev/null | sort -V | tail -1)
          if [ -z "$GXX" ]; then
            GXX=$(ls /usr/local/bin/g++-* 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$GFORTRAN" ]; then
            GFORTRAN=$(ls /usr/local/bin/gfortran-* 2>/dev/null | sort -V | tail -1)
          fi
          GCC=${GXX/g++/gcc}
          mkdir -p ~/.R
          {
            echo "CC=$GCC"
            echo "CXX=$GXX"
            echo "CXX11=$GXX"
            echo "CXX14=$GXX"
            echo "CXX17=$GXX"
            echo "CXX17STD=-std=gnu++17"
            echo "FC=$GFORTRAN"
            echo "F77=$GFORTRAN"
          } >> ~/.R/Makevars
        shell: bash

      - name: Install R-devel dependencies from source
        if: matrix.config.r == 'devel'
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages("remotes")
          remotes::install_github("r-lib/rlang")
          remotes::install_cran("rcmdcheck")
          remotes::install_deps(dependencies = TRUE, upgrade = "never")

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: matrix.config.r != 'devel'
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
