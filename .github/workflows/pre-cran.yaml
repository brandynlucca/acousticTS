name: Pre-CRAN

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

permissions: read-all

jobs:
  pre-cran-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.name }}
    continue-on-error: ${{ matrix.config.experimental }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: 'ubuntu-latest (release)', os: 'ubuntu-latest', r: 'release', clang: false, experimental: false}
          - {name: 'ubuntu-latest (devel)', os: 'ubuntu-latest', r: 'devel', clang: false, experimental: true}
          - {name: 'ubuntu-clang (release)', os: 'ubuntu-latest', r: 'release', clang: true, experimental: false}
          - {name: 'ubuntu-clang (devel)', os: 'ubuntu-latest', r: 'devel', clang: true, experimental: true}
          - {name: 'windows-latest (devel)', os: 'windows-latest', r: 'devel', clang: false, experimental: true}
          - {name: 'ubuntu-latest (no-suggests)', os: 'ubuntu-latest', r: 'release', clang: false, experimental: false, _R_CHECK_DEPENDS_ONLY_: true}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-tinytex@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: release
          use-public-rspm: ${{ matrix.config.r != 'devel' }}

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran qpdf ghostscript
          if [ "${{ matrix.config.clang }}" = "true" ]; then
            sudo apt-get install -y clang
          fi

      - name: Configure clang toolchain
        if: runner.os == 'Linux' && matrix.config.clang
        run: |
          GCC_INCLUDE=$(gcc -print-file-name=include)
          mkdir -p ~/.R
          cat > ~/.R/Makevars <<EOF
          CC=clang
          CXX=clang++
          CXX11=clang++
          CXX14=clang++
          CXX17=clang++
          CXX17STD=-std=gnu++17
          CPPFLAGS=-idirafter ${GCC_INCLUDE}
          FC=gfortran
          F77=gfortran
          EOF
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran")'
          build_args: 'c("--compact-vignettes=gs+qpdf")'
          upload-snapshots: true
