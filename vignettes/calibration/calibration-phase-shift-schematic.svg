   id="style1">
    .bg { fill: #faf6ef; }
    .head { font: 700 24px Georgia, serif; fill: #23314a; }
    .body { font: 17px Georgia, serif; fill: #2d2a26; }
    .small { font: 15px Georgia, serif; fill: #46576f; }
    .box { fill: #fffdfa; stroke: #4e6b93; stroke-width: 2.6; rx: 18; ry: 18; }
    .sphere { fill: #dfe7f3; stroke: #4e6b93; stroke-width: 3; }
    .incident { stroke: #8f2d56; stroke-width: 4; fill: none; }
    .outgoing { stroke: #1f6f5f; stroke-width: 4; fill: none; }
    .link { stroke: #c48b1f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .arrow { stroke: #4f4a44; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
  </style>
