<title
   id="title">Modal phase-shift bookkeeping for a solid sphere</title>
<desc
   id="desc">Schematic showing that each incident partial wave is matched at the sphere boundary and returned as an outgoing partial wave whose complex coefficient is parameterized by the modal phase shift eta_m.</desc>
