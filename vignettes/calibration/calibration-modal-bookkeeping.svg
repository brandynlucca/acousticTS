      .accent3 { fill: #e2f0e1; }
      .txt { font: 16px Georgia, serif; fill: #2f2822; }
      .head { font: 700 22px Georgia, serif; fill: #1f1a16; }
      .small { font: 14px Georgia, serif; fill: #4e443b; }
      .arrow { stroke: #4e443b; stroke-width: 2.5; fill: none; marker-end: url(#m); }
    </style>
