  <title
     id="title">Calibration modal bookkeeping</title>
  <desc
     id="desc">Pipeline from incident partial waves through elastic phase shifts to the backscattering quantities reported by the calibration model.</desc>
  <defs
     id="defs1">
    <style
       id="style1">
      .bg { fill: #f8f4ec; }
