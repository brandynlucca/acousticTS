  <text
     x="100.31258"
     y="26.156012"
     class="head"
     id="text1"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:22px;line-height:normal;font-family:Georgia, serif">How the calibration sphere series turns into reported output</text>
  <rect
     x="9.5627193"
     y="60.156013"
     width="250.92799"
     height="138.382"
     class="box accent1"
     id="rect2" />
  <text
     x="15.950106"
     y="78.097458"
     class="txt"
     id="text2"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:Georgia, serif">1. Expand the incident plane wave</text>
  <text
     x="16.385653"
     y="102.70105"
     class="small"
     id="text3"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;fill:#4e443b"><tspan
       sodipodi:role="line"
       id="tspan27"
       x="16.385653"
       y="102.70105">Each order m contributes a spherical</tspan><tspan
       sodipodi:role="line"
       id="tspan28"
       x="16.385653"
       y="120.20106">Bessel term: <tspan
   style="font-style:italic;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Italic';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
   id="tspan32">j</tspan><tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;baseline-shift:sub"
   id="tspan33">m</tspan><tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
   id="tspan37">(k</tspan><tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;baseline-shift:sub"
   id="tspan35">1</tspan><tspan
   id="tspan41"
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal">r)</tspan><tspan
   style="font-style:italic;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Italic';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
   id="tspan38">P</tspan><tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;baseline-shift:sub"
   id="tspan34">m</tspan><tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
   id="tspan39">(cos θ)</tspan>.</tspan><tspan
       sodipodi:role="line"
       id="tspan29"
       x="16.385653"
       y="137.70105"></tspan><tspan
       sodipodi:role="line"
       id="tspan30"
       x="16.385653"
       y="155.20105">Inside the sphere, both longitudinal</tspan><tspan
       sodipodi:role="line"
       id="tspan31"
       x="16.385653"
       y="172.70105">and shear responses must be matched.</tspan></text>
  <path
     d="m 564.78241,129.34701 c 17.67107,0 27.30982,0 46.58737,0"
     class="arrow"
     id="path18" />
  <rect
     x="313.56271"
     y="60.156013"
     width="250.92799"
     height="138.382"
     class="box accent2"
     id="rect6" />
  <text
     x="319.56271"
     y="78.10527"
     class="txt"
     id="text7"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:Georgia, serif">2. Match the surface conditions</text>
  <text
     x="320.31955"
     y="102.70105"
     class="small"
     id="text8"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;fill:#4e443b"><tspan
       sodipodi:role="line"
       id="tspan42"
       x="320.31955"
       y="102.70105">The elastic boundary problem yields</tspan><tspan
       sodipodi:role="line"
       id="tspan43"
       x="320.31955"
       y="120.20106">a real phase lag η<tspan
   style="font-size:65%;baseline-shift:sub"
   id="tspan51">m</tspan> for each order.</tspan><tspan
       sodipodi:role="line"
       id="tspan44"
       x="320.31955"
       y="137.70105"></tspan><tspan
       sodipodi:role="line"
       id="tspan45"
       x="320.31955"
       y="155.20105">The partial-wave contribution is:</tspan><tspan
       sodipodi:role="line"
       id="tspan46"
       x="320.31955"
       y="172.70105">sin(η<tspan
   style="font-size:65%;baseline-shift:sub"
   id="tspan48">m</tspan>) e<tspan
   style="font-size:65%;baseline-shift:super"
   id="tspan49">(i η<tspan
   style="font-size:65%;baseline-shift:sub"
   id="tspan50">m</tspan>)</tspan>.</tspan></text>
  <rect
     x="617.56281"
     y="60.156013"
     width="250.92801"
     height="138.38217"
     class="box accent3"
     id="rect11" />
  <text
     x="623.56274"
     y="78.097458"
     class="txt"
     id="text12"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:Georgia, serif">3. Sum, rescale, and report</text>
  <text
     x="623.96021"
     y="102.70789"
     class="small"
     id="text13"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;fill:#4e443b"><tspan
       sodipodi:role="line"
       id="tspan52"
       x="623.96021"
       y="102.70789">The mode sum gives the far-field</tspan><tspan
       sodipodi:role="line"
       id="tspan53"
       x="623.96021"
       y="120.20789">backscattering series in ka.</tspan><tspan
       sodipodi:role="line"
       id="tspan54"
       x="623.96021"
       y="137.70789" /><tspan
       sodipodi:role="line"
       id="tspan55"
       x="623.96021"
       y="155.20789">The reported linear length is <tspan
   style="font-style:italic;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Italic';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
   id="tspan63">f</tspan><tspan
   style="font-size:65%;baseline-shift:sub"
   id="tspan62">bs</tspan>,</tspan><tspan
       sodipodi:role="line"
       id="tspan56"
       x="623.96021"
       y="172.70789">followed by sigmabs = |<tspan
   style="font-style:italic;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Italic';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
   id="tspan59">f</tspan><tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:65%;font-family:Georgia, serif;-inkscape-font-specification:'Georgia, serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;baseline-shift:sub"
   id="tspan60">bs</tspan>|<tspan
   style="font-size:65%;baseline-shift:super"
   id="tspan66">2</tspan></tspan><tspan
       sodipodi:role="line"
       id="tspan57"
       x="623.96021"
       y="190.20789">and TS = 10log<tspan
   style="font-size:65%;baseline-shift:sub"
   id="tspan64">10</tspan>(σ<tspan
   style="font-size:65%;baseline-shift:sub"
   id="tspan65">bs</tspan>).</tspan></text>
</svg>
