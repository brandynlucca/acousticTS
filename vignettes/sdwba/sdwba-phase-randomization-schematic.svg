  <text x="518" y="102" font-family="Georgia, serif" font-size="24" fill="#7a3f0e">random phase factors e^(i phi<tspan baseline-shift="sub" font-size="70%">j</tspan>)</text>
  <text x="560" y="136" font-family="Georgia, serif" font-size="22" fill="#203040">phi<tspan baseline-shift="sub" font-size="70%">j</tspan> ~ N(0, sigma<tspan baseline-shift="sub" font-size="70%">phi</tspan><tspan baseline-shift="super" font-size="70%">2</tspan>)</text>

  <line x1="210" y1="320" x2="718" y2="320" stroke="#5a6b7a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="266" y="356" font-family="Georgia, serif" font-size="24" fill="#203040">cross terms damped by exp(-sigma<tspan baseline-shift="sub" font-size="70%">phi</tspan><tspan baseline-shift="super" font-size="70%">2</tspan>), self terms unchanged</text>
</svg>