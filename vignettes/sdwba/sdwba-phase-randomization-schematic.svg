      <path d="M0,0 L12,6 L0,12 z" fill="#203040"/>
    </marker>
  </defs>
  <text x="58" y="62" font-family="Georgia, serif" font-size="24" fill="#203040">deterministic DWBA segment sum</text>
  <line x1="60" y1="92" x2="220" y2="92" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="60" y1="126" x2="220" y2="126" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="60" y1="160" x2="220" y2="160" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M245 220 C320 150, 420 150, 500 220 S665 292, 760 220" fill="none" stroke="#0f5c5c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="322" cy="188" r="7" fill="#bb4d00"/>
  <circle cx="405" cy="170" r="7" fill="#bb4d00"/>
  <circle cx="492" cy="188" r="7" fill="#bb4d00"/>
  <circle cx="580" cy="220" r="7" fill="#bb4d00"/>
  <circle cx="670" cy="248" r="7" fill="#bb4d00"/>

  <text x="282" y="150" font-family="Georgia, serif" font-size="22" fill="#203040">q<tspan baseline-shift="sub" font-size="70%">1</tspan></text>
  <text x="372" y="132" font-family="Georgia, serif" font-size="22" fill="#203040">q<tspan baseline-shift="sub" font-size="70%">2</tspan></text>
  <text x="460" y="150" font-family="Georgia, serif" font-size="22" fill="#203040">q<tspan baseline-shift="sub" font-size="70%">3</tspan></text>
  <text x="548" y="204" font-family="Georgia, serif" font-size="22" fill="#203040">q<tspan baseline-shift="sub" font-size="70%">4</tspan></text>
  <text x="638" y="282" font-family="Georgia, serif" font-size="22" fill="#203040">q<tspan baseline-shift="sub" font-size="70%">5</tspan></text>

  <path d="M322 188 C300 128, 344 112, 360 156" fill="none" stroke="#7a3f0e" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <path d="M405 170 C382 112, 432 104, 446 144" fill="none" stroke="#7a3f0e" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
