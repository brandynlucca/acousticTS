<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Updated scatterer-class map</title>
  <desc id="desc">Scatterer generation and inheritance diagram for acousticTS classes.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf5; }
      .title { font: 700 28px Georgia, serif; fill: #203040; }
      .subtitle { font: 16px Georgia, serif; fill: #203040; }
      .label { font: 18px Georgia, serif; fill: #203040; }
      .small { font: 15px Georgia, serif; fill: #203040; }
      .line { stroke: #203040; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .group { fill: #f8f3e7; stroke: #b9ab83; stroke-width: 2.5; }
      .shape { fill: #d4e7e7; stroke: #0f5c5c; stroke-width: 3; }
      .generator { fill: #eef0de; stroke: #7a6a2a; stroke-width: 2.6; }
      .class { fill: #e8eff7; stroke: #325d88; stroke-width: 2.6; }
      .parent { fill: #dce8ea; stroke: #0f5c5c; stroke-width: 2.8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
