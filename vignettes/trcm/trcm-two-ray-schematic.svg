<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430">
  <rect width="920" height="430" fill="#fbfaf5"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#203040"/>
    </marker>
  </defs>

  <text x="56" y="58" font-family="Georgia, serif" font-size="26" fill="#203040">TRCM local cross-section at broadside incidence</text>
  <text x="62" y="108" font-family="Georgia, serif" font-size="22" fill="#203040">incident wave</text>
  <line x1="66" y1="138" x2="274" y2="138" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="66" y1="176" x2="274" y2="176" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="66" y1="214" x2="274" y2="214" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>

  <circle cx="474" cy="208" r="116" fill="#d9e8e2" stroke="#0f5c5c" stroke-width="6"/>
  <text x="388" y="86" font-family="Georgia, serif" font-size="22" fill="#203040">local fluid-cylinder cross-section</text>

  <line x1="358" y1="208" x2="590" y2="208" stroke="#5a6b7a" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="482" y="194" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#203040">L</text>

  <path d="M272 150 L356 150" fill="none" stroke="#8c3f19" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M356 150 L268 150" fill="none" stroke="#8c3f19" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="210" y="128" font-family="Georgia, serif" font-size="22" fill="#8c3f19">ray 1: near-face return</text>

  <polyline points="272,246 358,246 590,246 590,168 358,168 272,168" fill="none" stroke="#bb4d00" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="618" y="176" font-family="Georgia, serif" font-size="22" fill="#bb4d00">ray 2: transmitted return</text>
  <text x="618" y="206" font-family="Georgia, serif" font-size="20" fill="#203040">far-side reflection adds an extra two-way path</text>

  <line x1="328" y1="320" x2="620" y2="320" stroke="#203040" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="474" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#203040">body axis</text>
  <text x="168" y="384" font-family="Georgia, serif" font-size="24" fill="#203040">TRCM treats interference between the prompt near-face echo and the first through-body return.</text>
</svg>