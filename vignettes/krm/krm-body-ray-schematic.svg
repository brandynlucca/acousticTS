  <text x="168" y="232" font-family="Arial, sans-serif" font-size="13" fill="#35584f">z<tspan baseline-shift="sub" font-size="70%">U</tspan></text>
  <text x="388" y="232" font-family="Arial, sans-serif" font-size="13" fill="#35584f">z<tspan baseline-shift="sub" font-size="70%">L</tspan></text>
  <text x="310" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#364760">KRM retains the specular near-face return and the first transmitted two-way path.</text>
