  <title
     id="title">ESSMS boundary bookkeeping</title>
  <desc
     id="desc">Mode-wise bookkeeping for an elastic shelled sphere, showing the outer radius, inner radius, and the six scalar boundary conditions that feed the scattering coefficient.</desc>
