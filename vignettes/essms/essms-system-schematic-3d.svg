<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222" />
    </marker>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#d9d9d9" />
      <stop offset="100%" stop-color="#9c9c9c" />
    </radialGradient>
    <radialGradient id="shellGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f2f2f2" />
      <stop offset="50%" stop-color="#cfcfcf" />
      <stop offset="100%" stop-color="#a9a9a9" />
    </radialGradient>
    <style>
      .small { font: 15px Arial, sans-serif; fill: #111; font-weight: 600; }
      .axis { stroke: #222; stroke-width: 2; marker-end: url(#arrow); }
      .ring { fill: url(#shellGrad); stroke: #222; stroke-width: 2; }
      .core { fill: url(#sphereGrad); stroke: #222; stroke-width: 2; }
      .slice { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .wave { stroke: #222; stroke-width: 2; fill: none; }
      .arc { stroke: #222; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Incident plane wave (closer) -->
  <path class="wave" d="M120,260 C145,240 170,280 195,260 C220,240 245,280 270,260" />
  <path class="wave" d="M120,300 C145,280 170,320 195,300 C220,280 245,320 270,300" />
  <line class="axis" x1="100" y1="280" x2="285" y2="280" />

  <!-- 3D-like sphere with cutaway -->
  <circle class="ring" cx="560" cy="280" r="140" />
  <circle class="ring" cx="560" cy="280" r="90" />
  <circle class="core" cx="560" cy="280" r="45" />

  <!-- Cutaway sector (right-front) -->
  <path class="slice" d="M560,280 L700,235 A140,140 0 0 1 700,325 Z" />
  <path class="slice" d="M560,280 L650,250 A90,90 0 0 1 650,310 Z" />
  <path class="slice" d="M560,280 L605,265 A45,45 0 0 1 605,295 Z" />

  <!-- Cartesian axes (x, y, z) -->
  <line class="axis" x1="560" y1="280" x2="700" y2="280" />
  <line class="axis" x1="560" y1="280" x2="560" y2="140" />
  <line class="axis" x1="560" y1="280" x2="470" y2="360" />
  <text class="small" x="710" y="285">x</text>
  <text class="small" x="552" y="125">z</text>
  <text class="small" x="445" y="380">y</text>

  <!-- Spherical coordinates -->
  <line class="axis" x1="560" y1="280" x2="640" y2="210" />
  <text class="small" x="645" y="210">r</text>
  <path class="arc" d="M600,280 A40,40 0 0 1 630,250" />
  <text class="small" x="635" y="255">θ</text>
  <path class="arc" d="M560,320 A45,18 0 1 0 605,320" />
  <text class="small" x="610" y="335">φ</text>
</svg>
