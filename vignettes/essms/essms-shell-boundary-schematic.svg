<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360">
  <rect width="560" height="360" fill="#f8f6f0"/>
  <text x="280" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#24334b">Elastic Shell Interfaces and Boundary Conditions</text>
  <circle cx="220" cy="190" r="112" fill="#d8e3ef" stroke="#57779b" stroke-width="3"/>
  <circle cx="220" cy="190" r="68" fill="#f8f6f0" stroke="#57779b" stroke-width="3"/>
  <circle cx="220" cy="190" r="4" fill="#57779b"/>
  <text x="220" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#57779b">shell</text>
  <text x="220" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2b425f">r = a</text>
  <text x="220" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2b425f">r = b</text>
  <line x1="220" y1="78" x2="220" y2="40" stroke="#8a6231" stroke-width="3"/>
  <line x1="220" y1="122" x2="220" y2="88" stroke="#8a6231" stroke-width="3"/>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="15" fill="#24334b">At r = a:</text>
  <text x="400" y="136" font-family="Arial, sans-serif" font-size="14" fill="#24334b">pressure continuity</text>
  <text x="400" y="158" font-family="Arial, sans-serif" font-size="14" fill="#24334b">radial-velocity continuity</text>
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="14" fill="#24334b">zero shear traction</text>
  <text x="400" y="232" font-family="Arial, sans-serif" font-size="15" fill="#24334b">At r = b:</text>
  <text x="400" y="256" font-family="Arial, sans-serif" font-size="14" fill="#24334b">pressure continuity</text>
  <text x="400" y="278" font-family="Arial, sans-serif" font-size="14" fill="#24334b">radial-velocity continuity</text>
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="14" fill="#24334b">zero shear traction</text>
</svg>