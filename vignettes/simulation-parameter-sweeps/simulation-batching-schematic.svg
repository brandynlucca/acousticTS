<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Simulation workflow overview</title>
  <desc id="desc">Overview schematic for simulate_ts showing the progression from one baseline object to parameter specification, design cells, realization-level jobs, and collected model outputs.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf4; }
      .panel { fill: #fffdfa; stroke: #2d2b28; stroke-width: 2; }
      .box1 { fill: #d4e7e7; stroke: #0f5c5c; stroke-width: 3; }
      .box2 { fill: #eef0de; stroke: #7a6a2a; stroke-width: 3; }
      .box3 { fill: #f3dfcf; stroke: #a35d24; stroke-width: 3; }
      .box4 { fill: #e8e1f2; stroke: #5d4c83; stroke-width: 3; }
      .arrow { stroke: #203040; stroke-width: 3.5; fill: none; marker-end: url(#arr); }
      .head { font: 700 24px Georgia, "Times New Roman", serif; fill: #203040; }
      .txt { font: 18px Georgia, "Times New Roman", serif; fill: #203040; }
      .small { font: 16px Georgia, "Times New Roman", serif; fill: #4e4a44; }
      .mono { font: 17px "Courier New", monospace; fill: #0f4e60; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#203040"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="360"/>
  <rect class="panel" x="20" y="20" width="920" height="320" rx="16" ry="16"/>
  <text class="head" x="480" y="54" text-anchor="middle">How one baseline object becomes a simulation study in simulate_ts()</text>

  <rect class="box1" x="42" y="100" width="180" height="120" rx="16" ry="16"/>
  <text class="txt" x="132" y="134" text-anchor="middle">Baseline object</text>
  <text class="small" x="132" y="162" text-anchor="middle">one target definition</text>
  <text class="small" x="132" y="184" text-anchor="middle">geometry, materials,</text>
  <text class="small" x="132" y="206" text-anchor="middle">and metadata</text>

  <rect class="box2" x="274" y="100" width="188" height="120" rx="16" ry="16"/>
  <text class="txt" x="368" y="134" text-anchor="middle">Parameter rules</text>
  <text class="small" x="368" y="162" text-anchor="middle">fixed values</text>
  <text class="small" x="368" y="184" text-anchor="middle">explicit vectors</text>
  <text class="small" x="368" y="206" text-anchor="middle">or generators</text>

  <rect class="box3" x="514" y="100" width="188" height="120" rx="16" ry="16"/>
  <text class="txt" x="608" y="134" text-anchor="middle">Simulation design</text>
  <text class="small" x="608" y="162" text-anchor="middle">batch cells from</text>
  <text class="mono" x="608" y="186" text-anchor="middle">batch_by</text>
  <text class="small" x="608" y="208" text-anchor="middle">plus within-cell realizations</text>

  <rect class="box4" x="754" y="100" width="164" height="120" rx="16" ry="16"/>
  <text class="txt" x="836" y="134" text-anchor="middle">Collected output</text>
  <text class="small" x="836" y="162" text-anchor="middle">one table per model</text>
  <text class="small" x="836" y="184" text-anchor="middle">with batch labels,</text>
  <text class="small" x="836" y="206" text-anchor="middle">realizations, and TS results</text>

  <line class="arrow" x1="222" y1="160" x2="274" y2="160"/>
  <line class="arrow" x1="462" y1="160" x2="514" y2="160"/>
  <line class="arrow" x1="702" y1="160" x2="754" y2="160"/>

  <text class="small" x="128" y="286">This opening figure is only the workflow map.</text>
  <text class="small" x="128" y="308">The later figures explain the parameter modes, batch-cell nesting, object reworking, and execution layout in detail.</text>
</svg>
