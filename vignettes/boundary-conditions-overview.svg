<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Boundary-condition overview</title>
  <desc id="desc">Overview of rigid, pressure-release, fluid-filled, layered-shell, elastic-shell, and weak-scattering boundary assumptions with links to companion theory pages.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3ea; }
      .panel { fill: #fffdf8; stroke: #2d2a26; stroke-width: 2.5; rx: 18; ry: 18; }
      .head { font: 700 24px Georgia, serif; fill: #1f1b17; }
      .sub { font: 600 17px Georgia, serif; fill: #1f1b17; }
      .txt { font: 15px Georgia, serif; fill: #2f2a24; }
      .small { font: 14px Georgia, serif; fill: #4b433b; }
      .link { fill: #fff; stroke: #2d2a26; stroke-width: 2; rx: 12; ry: 12; }
      .rigid { fill: #dde8f7; }
      .soft { fill: #fde5d4; }
      .fluid { fill: #dff1e4; }
      .shell { fill: #efe3f6; }
      .weak { fill: #f6efc8; }
      .arrow { stroke: #4b433b; stroke-width: 2.5; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b433b"/>
    </marker>
  </defs>

  <rect class="bg" width="980" height="560"/>

  <text x="40" y="48" class="head">How the package boundary families differ</text>
  <text x="40" y="78" class="txt">The organizing question is which field quantity is prescribed most directly at the interface.</text>

  <rect x="38" y="110" width="278" height="176" class="panel rigid"/>
  <text x="58" y="144" class="sub">Simple limits</text>
  <text x="58" y="176" class="txt">Fixed rigid:</text>
  <text x="78" y="200" class="small">normal velocity vanishes</text>
  <text x="78" y="221" class="small">∂p/∂n = 0</text>
  <text x="58" y="253" class="txt">Pressure release:</text>
  <text x="78" y="277" class="small">surface pressure vanishes</text>
  <text x="78" y="298" class="small">p = 0</text>
  <a href="sphms/sphms-theory.html">
    <rect x="174" y="234" width="116" height="34" class="link"/>
    <text x="194" y="257" class="small">SPHMS</text>
  </a>
  <a href="fcms/fcms-theory.html">
    <rect x="174" y="274" width="116" height="34" class="link"/>
    <text x="196" y="297" class="small">FCMS</text>
  </a>

  <rect x="352" y="110" width="278" height="176" class="panel fluid"/>
  <text x="372" y="144" class="sub">Transmission boundary</text>
  <text x="372" y="176" class="txt">Fluid-filled interface:</text>
  <text x="392" y="200" class="small">pressure is continuous</text>
  <text x="392" y="221" class="small">normal velocity is continuous</text>
  <text x="392" y="242" class="small">contrast enters through ρ and c</text>
  <a href="psms/psms-theory.html">
    <rect x="488" y="192" width="116" height="34" class="link"/>
    <text x="510" y="215" class="small">PSMS</text>
  </a>
  <a href="sphms/sphms-theory.html">
    <rect x="488" y="232" width="116" height="34" class="link"/>
    <text x="508" y="255" class="small">SPHMS</text>
  </a>

  <rect x="666" y="110" width="276" height="176" class="panel shell"/>
  <text x="686" y="144" class="sub">Finite-thickness shell</text>
  <text x="686" y="176" class="txt">Inelastic shell:</text>
  <text x="706" y="200" class="small">acoustic layer with two radii</text>
  <text x="706" y="221" class="small">no shear support</text>
  <text x="686" y="253" class="txt">Elastic shell:</text>
  <text x="706" y="277" class="small">normal traction couples to displacement</text>
  <text x="706" y="298" class="small">shear traction must vanish in the fluid</text>
  <a href="essms/essms-theory.html">
    <rect x="804" y="246" width="112" height="34" class="link"/>
    <text x="823" y="269" class="small">ESSMS</text>
  </a>

  <rect x="112" y="344" width="760" height="152" class="panel weak"/>
  <text x="134" y="378" class="sub">Weak-scattering approximation</text>
  <text x="134" y="408" class="txt">No strongly reflecting interface is prescribed. Instead the total field is linearized about the surrounding-fluid solution.</text>
  <text x="134" y="434" class="small">Use when density and sound-speed contrasts are both close to 1 and the object is smooth and fluid-like.</text>
  <a href="dwba/dwba-theory.html">
    <rect x="682" y="390" width="112" height="34" class="link"/>
    <text x="703" y="413" class="small">DWBA</text>
  </a>
  <a href="sdwba/sdwba-theory.html">
    <rect x="806" y="390" width="112" height="34" class="link"/>
    <text x="821" y="413" class="small">SDWBA</text>
  </a>

  <path d="M177 286 C177 320, 230 330, 260 344" class="arrow"/>
  <path d="M491 286 C491 320, 491 330, 491 344" class="arrow"/>
  <path d="M805 286 C805 320, 752 330, 722 344" class="arrow"/>
</svg>
