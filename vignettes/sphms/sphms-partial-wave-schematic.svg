<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430">
  <rect width="900" height="430" fill="#fbfaf5"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#203040"/>
    </marker>
  </defs>
  <text x="58" y="58" font-family="Georgia, serif" font-size="26" fill="#203040">Spherical partial-wave geometry</text>
  <line x1="70" y1="140" x2="270" y2="140" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="70" y1="178" x2="270" y2="178" stroke="#203040" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="72" y="114" font-family="Georgia, serif" font-size="22" fill="#203040">incident plane wave</text>

  <circle cx="470" cy="206" r="112" fill="#d4e7e7" stroke="#0f5c5c" stroke-width="6"/>
  <circle cx="470" cy="206" r="5" fill="#203040"/>
  <text x="490" y="214" font-family="Georgia, serif" font-size="24" fill="#203040">r = a</text>

  <path d="M470 206 L578 206" stroke="#7a3f0e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="520" y="194" font-family="Georgia, serif" font-size="22" fill="#7a3f0e">radial functions</text>
  <text x="520" y="222" font-family="Georgia, serif" font-size="20" fill="#7a3f0e">j<tspan baseline-shift="sub" font-size="70%">n</tspan>, h<tspan baseline-shift="sub" font-size="70%">n</tspan><tspan baseline-shift="super" font-size="70%">(1)</tspan></text>

  <path d="M470 206 C602 92, 704 106, 820 142" fill="none" stroke="#bb4d00" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M470 206 C590 314, 690 314, 810 282" fill="none" stroke="#bb4d00" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="654" y="120" font-family="Georgia, serif" font-size="22" fill="#203040">outgoing scattered modes</text>
  <text x="642" y="148" font-family="Georgia, serif" font-size="20" fill="#203040">A<tspan baseline-shift="sub" font-size="70%">n</tspan> h<tspan baseline-shift="sub" font-size="70%">n</tspan><tspan baseline-shift="super" font-size="70%">(1)</tspan>(k<tspan baseline-shift="sub" font-size="70%">1</tspan> r) P<tspan baseline-shift="sub" font-size="70%">n</tspan>(cos theta)</text>

  <path d="M470 206 A52 52 0 0 1 430 154" fill="none" stroke="#5a6b7a" stroke-width="3"/>
  <text x="394" y="146" font-family="Georgia, serif" font-size="22" fill="#203040">theta</text>

  <text x="246" y="358" font-family="Georgia, serif" font-size="24" fill="#203040">boundary conditions at r = a determine each partial-wave coefficient A<tspan baseline-shift="sub" font-size="70%">n</tspan> independently</text>
</svg>