<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">HPA geometry factors</title>
  <desc id="desc">Schematic comparing the geometry bookkeeping used by HPA for spheres, prolate spheroids, straight cylinders, and bent cylinders.</desc>
  <defs>
    <style>
      .bg { fill: #fbf8f1; }
      .panel { fill: #fffdf8; stroke: #2f3b2f; stroke-width: 2; }
      .shape { fill: none; stroke: #155e63; stroke-width: 4; }
      .axis { stroke: #8c6239; stroke-width: 3; stroke-dasharray: 7 6; fill: none; }
      .guide { stroke: #697565; stroke-width: 2; stroke-dasharray: 5 5; fill: none; }
      .small { font: 15px Georgia, "Times New Roman", serif; fill: #1f2520; }
      .math { font: italic 18px Georgia, "Times New Roman", serif; fill: #0b3d43; }
      .heading { font: 700 19px Georgia, "Times New Roman", serif; fill: #1f2520; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="420"/>

  <rect class="panel" x="20" y="24" width="218" height="172" rx="16" ry="16"/>
  <text class="heading" x="129" y="52" text-anchor="middle">Sphere</text>
  <circle class="shape" cx="129" cy="112" r="46"/>
  <line class="guide" x1="129" y1="112" x2="171" y2="112"/>
  <text class="math" x="151" y="102">a</text>
  <text class="small" x="129" y="168" text-anchor="middle">Single radial scale</text>
  <text class="math" x="129" y="188" text-anchor="middle">(ka), a<tspan baseline-shift="sub" font-size="14">2</tspan></text>

  <rect class="panel" x="254" y="24" width="218" height="172" rx="16" ry="16"/>
  <text class="heading" x="363" y="52" text-anchor="middle">Prolate spheroid</text>
  <ellipse class="shape" cx="363" cy="112" rx="72" ry="34"/>
  <line class="axis" x1="291" y1="112" x2="435" y2="112"/>
  <line class="guide" x1="291" y1="64" x2="435" y2="64"/>
  <line class="guide" x1="291" y1="64" x2="291" y2="78"/>
  <line class="guide" x1="435" y1="64" x2="435" y2="78"/>
  <text class="math" x="363" y="56" text-anchor="middle">L</text>
  <text class="math" x="363" y="168" text-anchor="middle">L<tspan baseline-shift="sub" font-size="14">2</tspan>, (ka), &#945;<tspan baseline-shift="sub" font-size="14">&#960;c</tspan></text>
  <text class="small" x="363" y="188" text-anchor="middle">Elongated-body scale without cylinder directivity</text>

  <rect class="panel" x="488" y="24" width="218" height="172" rx="16" ry="16"/>
  <text class="heading" x="597" y="52" text-anchor="middle">Straight cylinder</text>
  <rect class="shape" x="540" y="92" width="114" height="40" rx="20" ry="20"/>
  <line class="axis" x1="540" y1="112" x2="654" y2="112"/>
  <line class="guide" x1="540" y1="72" x2="654" y2="72"/>
  <line class="guide" x1="540" y1="72" x2="540" y2="86"/>
  <line class="guide" x1="654" y1="72" x2="654" y2="86"/>
  <text class="math" x="597" y="64" text-anchor="middle">L</text>
  <line class="guide" x1="672" y1="112" x2="672" y2="92"/>
  <text class="math" x="682" y="106">a</text>
  <text class="math" x="597" y="168" text-anchor="middle">K = k sin&#952;</text>
  <text class="math" x="597" y="188" text-anchor="middle">s = sin(kL cos&#952;)/(kL cos&#952;)</text>

  <rect class="panel" x="722" y="24" width="218" height="172" rx="16" ry="16"/>
  <text class="heading" x="831" y="52" text-anchor="middle">Bent cylinder</text>
  <path class="shape" d="M770 136 Q831 56 892 136"/>
  <path class="axis" d="M770 136 Q831 56 892 136"/>
  <line class="guide" x1="831" y1="56" x2="831" y2="34"/>
  <line class="guide" x1="831" y1="56" x2="862" y2="87"/>
  <text class="math" x="842" y="46">&#961;<tspan baseline-shift="sub" font-size="14">c</tspan></text>
  <line class="guide" x1="784" y1="154" x2="878" y2="154"/>
  <text class="math" x="831" y="174" text-anchor="middle">L</text>
  <text class="math" x="831" y="188" text-anchor="middle">&#8461; replaces s</text>

  <text class="small" x="480" y="248" text-anchor="middle">The HPA family shares one asymptotic logic, but each geometry carries its own bookkeeping scale.</text>
  <text class="small" x="480" y="272" text-anchor="middle">Spheres use radius alone, prolate spheroids use an elongated-body scale, straight cylinders add axial sinc directivity,</text>
  <text class="small" x="480" y="296" text-anchor="middle">and bent cylinders replace that straight-axis coherence by the curvature factor &#8461;.</text>
</svg>
