<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">PSMS coordinate geometry</title>
  <desc id="desc">Improved prolate spheroidal coordinate schematic showing the meridional coordinate net, focal points plus and minus q, the boundary xi equals xi naught, and the semi-axes a and b.</desc>
  <defs>
    <style>
      .bg { fill: #fbf8f1; }
      .frame { fill: #fffdf8; stroke: #2b342d; stroke-width: 2; rx: 18; }
      .axis { stroke: #223127; stroke-width: 2.5; }
      .guide { stroke: #6b736d; stroke-width: 2; stroke-dasharray: 6 6; }
      .xi { fill: none; stroke: #4d8a78; stroke-width: 2.5; }
      .xiHighlight { fill: #d9ece4; stroke: #0f5c5c; stroke-width: 4.5; }
      .eta { fill: none; stroke: #8a5c34; stroke-width: 2.5; }
      .label { font: 19px Georgia, "Times New Roman", serif; fill: #1f2520; }
      .small { font: 16px Georgia, "Times New Roman", serif; fill: #1f2520; }
      .math { font: italic 21px Georgia, "Times New Roman", serif; fill: #0d4c52; }
      .heading { font: 700 24px Georgia, "Times New Roman", serif; fill: #1f2520; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a4b24"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <rect class="frame" x="24" y="26" width="932" height="468" rx="18"/>

  <text class="heading" x="490" y="62" text-anchor="middle">Prolate spheroidal coordinates in the meridional plane</text>

  <line class="axis" x1="120" y1="260" x2="860" y2="260"/>
  <line class="axis" x1="490" y1="410" x2="490" y2="100"/>
  <text class="math" x="870" y="266">z</text>
  <text class="math" x="500" y="112">x</text>

  <ellipse class="xi" cx="490" cy="260" rx="120" ry="72"/>
  <ellipse class="xi" cx="490" cy="260" rx="195" ry="104"/>
  <ellipse class="xiHighlight" cx="490" cy="260" rx="280" ry="142"/>

  <path class="eta" d="M395 120 C440 180, 455 225, 490 260 C455 295, 440 340, 395 400"/>
  <path class="eta" d="M585 120 C540 180, 525 225, 490 260 C525 295, 540 340, 585 400"/>
  <path class="eta" d="M332 142 C404 204, 436 232, 490 260 C436 288, 404 316, 332 378" opacity="0.65"/>
  <path class="eta" d="M648 142 C576 204, 544 232, 490 260 C544 288, 576 316, 648 378" opacity="0.65"/>

  <circle cx="370" cy="260" r="6" fill="#8a5c34"/>
  <circle cx="610" cy="260" r="6" fill="#8a5c34"/>
  <text class="math" x="343" y="292">-q</text>
  <text class="math" x="604" y="292">+q</text>

  <line class="guide" x1="210" y1="260" x2="770" y2="260"/>
  <line class="guide" x1="490" y1="118" x2="490" y2="402"/>

  <line x1="490" y1="260" x2="770" y2="260" stroke="#7a4b24" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="math" x="625" y="242">a</text>

  <line x1="490" y1="260" x2="490" y2="118" stroke="#7a4b24" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="math" x="505" y="188">b</text>

  <text class="math" x="693" y="152">&#958; = &#958;<tspan baseline-shift="sub" font-size="16">0</tspan></text>
  <text class="small" x="687" y="176">body boundary</text>

  <text class="math" x="677" y="235">&#958; = const.</text>
  <text class="small" x="669" y="257">prolate spheroids</text>

  <text class="math" x="642" y="334">&#951; = const.</text>
  <text class="small" x="627" y="356">two-sheet hyperbolae in section</text>

  <text class="small" x="108" y="444">The full three-dimensional spheroid is generated by revolving this meridional section about the z-axis.</text>
  <text class="small" x="108" y="470">Exact separation works because the target boundary is the single coordinate surface &#958; = &#958;<tspan baseline-shift="sub" font-size="13">0</tspan>.</text>
</svg>
