<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430">
  <rect width="900" height="430" fill="#fbfaf5"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#203040"/>
    </marker>
  </defs>
  <text x="58" y="56" font-family="Georgia, serif" font-size="26" fill="#203040">Prolate spheroidal coordinates matched to the boundary</text>

  <ellipse cx="468" cy="214" rx="222" ry="118" fill="#d4e7e7" stroke="#0f5c5c" stroke-width="6"/>
  <line x1="246" y1="214" x2="690" y2="214" stroke="#203040" stroke-width="3"/>
  <line x1="468" y1="96" x2="468" y2="332" stroke="#203040" stroke-width="3"/>

  <circle cx="372" cy="214" r="6" fill="#bb4d00"/>
  <circle cx="564" cy="214" r="6" fill="#bb4d00"/>
  <text x="344" y="246" font-family="Georgia, serif" font-size="22" fill="#203040">-q</text>
  <text x="556" y="246" font-family="Georgia, serif" font-size="22" fill="#203040">+q</text>
  <text x="392" y="82" font-family="Georgia, serif" font-size="22" fill="#203040">surface xi = xi<tspan baseline-shift="sub" font-size="70%">0</tspan></text>

  <line x1="468" y1="214" x2="690" y2="214" stroke="#7a3f0e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="542" y="198" font-family="Georgia, serif" font-size="22" fill="#7a3f0e">major semi-axis a</text>

  <line x1="468" y1="214" x2="468" y2="96" stroke="#7a3f0e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="484" y="154" font-family="Georgia, serif" font-size="22" fill="#7a3f0e">minor semi-axis b</text>

  <path d="M468 214 C512 168, 552 164, 596 168" fill="none" stroke="#5a6b7a" stroke-width="3"/>
  <text x="556" y="150" font-family="Georgia, serif" font-size="22" fill="#203040">eta = const.</text>
  <path d="M372 214 C432 118, 514 118, 564 214" fill="none" stroke="#5a6b7a" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="420" y="118" font-family="Georgia, serif" font-size="22" fill="#203040">xi = const.</text>

  <text x="194" y="372" font-family="Georgia, serif" font-size="24" fill="#203040">separation works because the scatterer boundary is a single coordinate surface in (xi, eta, phi)</text>
</svg>