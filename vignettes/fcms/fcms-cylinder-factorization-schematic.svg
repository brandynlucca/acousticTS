  <text x="654" y="126" font-family="Georgia, serif" font-size="20" fill="#203040">sin(kL cos theta)/(kL cos theta)</text>

  <text x="228" y="382" font-family="Georgia, serif" font-size="24" fill="#203040">exact modal physics on the circular cross-section, finite-length coherence along the cylinder axis</text>
