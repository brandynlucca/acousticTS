<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <rect width="760" height="420" fill="#f6fbff"/>
  <circle cx="260" cy="210" r="150" fill="#d7eef7" stroke="#4c7a89" stroke-width="2"/>
  <circle cx="260" cy="210" r="110" fill="#f0c7a1" stroke="#8f5b2f" stroke-width="2"/>
  <circle cx="260" cy="210" r="72" fill="#fff3c4" stroke="#b89327" stroke-width="2"/>
  <circle cx="260" cy="210" r="42" fill="#f8c1d9" stroke="#b54b74" stroke-width="2"/>

  <line x1="260" y1="210" x2="410" y2="210" stroke="#2b2b2b" stroke-width="1.8"/>
  <line x1="260" y1="210" x2="370" y2="150" stroke="#2b2b2b" stroke-width="1.8"/>
  <line x1="260" y1="210" x2="332" y2="120" stroke="#2b2b2b" stroke-width="1.8"/>

  <text x="420" y="214" font-size="22" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">R₂: outer viscous-layer radius</text>
  <text x="380" y="145" font-size="22" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">R₃: shell outer radius</text>
  <text x="342" y="112" font-size="22" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">R₄: gas-core radius</text>

  <rect x="470" y="86" width="230" height="210" rx="18" fill="#ffffff" stroke="#9bb5c2" stroke-width="1.5"/>
  <text x="492" y="122" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">Region 1: seawater</text>
  <text x="492" y="155" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">acoustic wave number k₁</text>
  <text x="492" y="193" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">Region 2: viscous layer</text>
  <text x="492" y="226" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">compressional k꜀₂, shear kₛ₂</text>
  <text x="492" y="264" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">Region 3: elastic shell</text>
  <text x="492" y="297" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">compressional k꜀₃, shear kₛ₃</text>
  <text x="492" y="335" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">Region 4: gas core</text>
  <text x="492" y="368" font-size="21" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">acoustic wave number k₄</text>

  <text x="84" y="54" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#1f2c33">Layered spherical bookkeeping used by the viscous-elastic model</text>
</svg>
