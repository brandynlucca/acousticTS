<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">DWBA cross-section to Bessel factor</title>
  <desc id="desc">Diagram showing how azimuthal and radial integration over a circular section yields the J1 cross-sectional factor in the DWBA.</desc>
  <style>
    .bg { fill: #fbf8f1; }
    .head { font: 700 28px Georgia, serif; fill: #1f3345; }
    .body { font: 18px Georgia, serif; fill: #1f3345; }
    .small { font: 15px Georgia, serif; fill: #44586a; }
    .circle { fill: #dcecea; stroke: #3c7f80; stroke-width: 2.5; }
    .dash { fill: none; stroke: #9ab7b8; stroke-width: 1.8; stroke-dasharray: 6 5; }
    .arrow { stroke: #1f3345; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .accent { stroke: #bb4d00; stroke-width: 3.5; fill: none; marker-end: url(#arrow2); }
    .box { fill: #fffdfa; stroke: #718899; stroke-width: 2; rx: 16; ry: 16; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f3345"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bb4d00"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="390"/>
  <text x="36" y="42" class="head">Why the local circular section produces the Bessel factor</text>

  <text x="56" y="90" class="body">local circular section at s</text>
  <circle cx="240" cy="208" r="96" class="circle"/>
  <circle cx="240" cy="208" r="66" class="dash"/>
  <circle cx="240" cy="208" r="38" class="dash"/>
  <line x1="240" y1="208" x2="336" y2="208" class="arrow"/>
  <text x="346" y="214" class="body">r_perp</text>
  <path d="M278 194 A42 42 0 0 1 258 246" fill="none" stroke="#6a7e8f" stroke-width="2.5"/>
  <text x="288" y="188" class="body">phi</text>
  <line x1="240" y1="208" x2="240" y2="106" class="accent"/>
  <text x="250" y="116" class="body">phase gradient across section</text>
  <text x="250" y="140" class="small">set by 2 k_2 cos(beta_tilt)</text>

  <line x1="420" y1="208" x2="546" y2="208" class="arrow"/>
  <text x="436" y="184" class="body">integrate over phi, then r_perp</text>

  <rect x="580" y="86" width="330" height="220" class="box"/>
  <text x="604" y="126" class="body">Azimuthal step</text>
  <text x="604" y="154" class="small">integral exp(i z cos(phi)) dphi = 2 pi J_0(z)</text>
  <text x="604" y="202" class="body">Radial step</text>
  <text x="604" y="230" class="small">integral r J_0(b r) dr = a J_1(b a) / b</text>
  <text x="604" y="278" class="body">Result carried into the line integral</text>
  <text x="604" y="304" class="small">J_1(2 k_2 a cos(beta_tilt)) / cos(beta_tilt)</text>
</svg>
