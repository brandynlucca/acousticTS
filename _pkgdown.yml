reference:
  - title: Core Workflows

  - subtitle: Running and simulating models
    desc: >
      Primary package entry points for deterministic target-strength modeling
      and repeated simulation workflows.
    contents:
      - target_strength
      - simulate_ts

  - subtitle: Model registry and extensions
    desc: >
      Helpers for listing built-in models and registering custom model
      implementations for the current session or across sessions.
    contents:
      - available_models
      - register_model
      - unregister_model
      - reset_model_registry

  - subtitle: Inspection, plotting, and reshaping
    desc: >
      Helpers for pulling components out of package objects, visualizing stored
      results, and modifying geometry after construction.
    contents:
      - extract
      - plot.Scatterer
      - reforge
      - brake

  - subtitle: Bundled benchmark and example data
    desc: >
      Built-in objects used throughout the package examples, validation
      workflows, and benchmark reproductions.
    contents:
      - benchmark_ts
      - cod
      - krill
      - sardine

  - title: T-Matrix Post-Processing

  - subtitle: Stored-state scattering products
    desc: >
      Post-processing helpers that reuse stored T-matrix state for angular
      scattering, orientation averaging, diagnostics, and higher-level summary
      products.
    contents:
      - tmm_scattering
      - tmm_scattering_grid
      - tmm_average_orientation
      - tmm_orientation_distribution
      - tmm_bistatic_summary
      - tmm_diagnostics
      - tmm_products

  - title: Scatterer Types

  - subtitle: Scatterer classes
    desc: >
      General scattering classes that dictate expected parameters and model
      compatibility.
    contents:
      - Scatterer
      - CSC
      - ELA
      - BBF
      - CAL
      - ESS
      - GAS
      - FLS
      - SBF

  - subtitle: Scatterer generation
    desc: >
      Constructors for the supported scatterer classes.
    contents:
      - cal_generate
      - ess_generate
      - fls_generate
      - gas_generate
      - sbf_generate
      - bbf_generate

  - title: Scatterer Geometry

  - subtitle: Shape classes
    desc: >
      Canonical and arbitrary shape classes used throughout the package.
    contents:
      - Shape
      - Arbitrary
      - Cylinder
      - PolynomialCylinder
      - OblateSpheroid
      - ProlateSpheroid
      - Sphere

  - subtitle: Shape generation
    desc: >
      Shape constructors, canonicalization helpers, and the convenience wrapper
      for canonical geometry.
    contents:
      - canonicalize_shape
      - create_shape
      - arbitrary
      - cylinder
      - polynomial_cylinder
      - oblate_spheroid
      - prolate_spheroid
      - sphere

  - title: Acoustic and Elastic Utilities
    desc: >
      Utility functions for basic acoustic quantities, contrasts, and elastic
      material-property conversions.

  - subtitle: Acoustic quantities and coefficients
    contents:
      - wavenumber
      - linear
      - transmission_coefficient
      - compressibility
      - rho

  - subtitle: Elastic moduli for homogeneous isotropic materials
    contents:
      - pois
      - bulk
      - young
      - shear
      - lame

  - title: Mathematical Functions
    desc: >
      Special functions and numerical helpers used throughout the package.

  - subtitle: Summation, quadrature, and vector helpers
    contents:
      - along_sum
      - gauss_legendre
      - neumann
      - vecnorm

  - subtitle: Bessel functions (cylindrical)
    contents:
      - jc
      - yc
      - hc

  - subtitle: Bessel functions (spherical)
    contents:
      - js
      - ys
      - hs

  - subtitle: Legendre functions
    contents:
      - Pn
      - Pndk
      - Qn
      - Qndk

  - subtitle: Spheroidal wave functions
    contents:
      - Smn
      - Rmn

  - subtitle: Angle conversion
    contents:
      - degrees
      - radians
