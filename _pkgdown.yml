url: https://brandynlucca.github.io/acousticTS/
template:
  # params:
  #   math_method: mathjax
  bootstrap: 5
  math-rendering: katex

articles:
- title: Boundary conditions
  navbar: Boundary conditions
  contents:
  - boundary_conditions
- title: Solid elastic (calibration) sphere
  navbar: Solid elastic (calibration) sphere
  contents:
  - calibration/calibration-theory
  - calibration/calibration-implementation
- title: Elastic-shelled sphere
  navbar: Elastic-shelled sphere
  contents:
  - essms/essms-theory

reference:
- title: Scatterer types

- subtitle: Scatterer classes
  desc: >
    General scattering classes that dictate expected parameters and compatibility with different classes of 
    scattering models.
  contents:
  - Scatterer
  - CAL
  - ESS
  - GAS
  - FLS
  - SBF


- subtitle: Scatterer generation
  desc: >
    Functions that generate each of the supported scatterering classes.
  contents:
  - has_keyword("scatterer_type_generation")

- title: Scatterer shapes

- subtitle: Shape classes
  desc: >
    Generic shape classes used by various functions that provide the appropriate information for plotting, 
    model parameterization, and other features.
  contents:
  - Shape
  - Arbitrary
  - Cylinder
  - PolynomialCylinder
  - ProlateSpheroid
  - Sphere

- subtitle: Shape generation
  desc: >
    Generator functions for producing arbitrary or canonical shapes.
  contents:
  - create_shape
  - has_keyword("shape_generation")

- title: Scattering properties
  desc: >
    Functions used for computing different scattering properties (e.g. contrasts, impedances, coefficients) used 
    in various scattering models.

- subtitle: Elastic moduli for homogoneous isotropic materials
  contents:
  - has_keyword("elastic")

- title: Mathematical functions
  desc: >
    Mathematical functions used throughout the `acousticTS` package.

- subtitle: Bessel functions (cylindrical)
  contents:
  - jc
  - yc
  - hc

- title: Bessel functions (spherical)
  contents:
  - js
  - ys
  - hs

- subtitle: Legendre functions
  contents:
  - has_keyword("legendre")

- subtitle: Spheroidal wave functions
  contents:
  - Smn
  - Rmn

- subtitle: Vector operations
  contents:
  - vecnorm

- title: Conversion functions

- subtitle: Acoustics
  contents:
  - linear

- subtitle: Trigonometry
  contents:
  - degrees
  - radians

- title: internal
  contents:
  - lacks_concepts("null_concept")
